<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 강점 발견 진단 - Clarity 통합</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9962A;
  --gold-light: #E8C060;
  --gold-pale: #FDF3DC;
  --dark: #1A1208;
  --brown: #5C3D1E;
  --cream: #FEFAF0;
  --text: #2D1F0A;
  --muted: #9B7A30;
  --card-bg: #FFFFFF;
  --border: rgba(201,150,42,0.25);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--cream);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* ── SCREENS ── */
.screen { display:none; }
.screen.active { display:block; }

/* ══════════════════════════
   INTRO SCREEN
══════════════════════════ */
#intro {
  min-height: 100vh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
  text-align: center;
}
#intro.active { display:flex; }

.intro-ornament {
  width: 56px; height: 56px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items:center; justify-content:center;
  font-size: 22px;
  margin: 0 auto 28px;
  color: var(--gold);
  animation: pulse 3s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,150,42,0.3); }
  50% { box-shadow: 0 0 0 12px rgba(201,150,42,0); }
}

.intro-tag {
  font-size: 11px; letter-spacing: 3px;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 16px;
}

.intro-title {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(26px, 5vw, 42px);
  font-weight: 700;
  line-height: 1.35;
  color: var(--dark);
  margin-bottom: 20px;
}
.intro-title em { color: var(--gold); font-style: normal; }

.intro-sub {
  font-size: 15px; color: var(--brown);
  line-height: 1.9; max-width: 500px;
  margin: 0 auto 40px;
}

.btn-start {
  background: var(--dark); color: var(--gold-light);
  border: none; cursor: pointer;
  padding: 16px 52px;
  font-family: 'Noto Serif KR', serif;
  font-size: 17px; font-weight: 600;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.btn-start:hover {
  background: var(--gold); color: var(--dark);
  transform: translateY(-2px);
}

/* ══════════════════════════
   QUIZ SCREEN
══════════════════════════ */
#quiz {
  min-height: 100vh;
}
#quiz.active { display: block; }

.quiz-header {
  background: var(--dark);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}

.quiz-logo {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px; color: var(--gold-light);
  font-weight: 600; letter-spacing: 0.5px;
}

.progress-wrap {
  flex: 1; max-width: 320px; margin: 0 28px;
}
.progress-info {
  display: flex; justify-content: space-between;
  font-size: 11px; color: rgba(232,192,96,0.6);
  margin-bottom: 6px;
}
.progress-bar-bg {
  height: 3px; background: rgba(255,255,255,0.1);
  border-radius: 2px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--gold);
  transition: width 0.5s ease;
  border-radius: 2px;
}

.q-counter {
  font-family: 'Playfair Display', serif;
  font-size: 22px; color: var(--gold);
  font-weight: 700;
}

.quiz-body {
  max-width: 720px;
  margin: 0 auto;
  padding: 60px 28px 80px;
}

.q-domain-tag {
  font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.q-domain-tag::before {
  content: ''; display: inline-block;
  width: 24px; height: 1px; background: var(--gold);
}

.question-text {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(18px, 3vw, 24px);
  font-weight: 600;
  color: var(--dark);
  line-height: 1.65;
  margin-bottom: 48px;
}

.scale-buttons {
  display: flex; gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.scale-btn {
  width: 52px; height: 52px;
  border: 1.5px solid var(--border);
  background: white;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--brown);
  transition: all 0.1s ease-out;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
}
.scale-btn .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border);
}
.scale-btn:hover { border-color: var(--gold); background: var(--gold-pale); }
.scale-btn.selected { background: var(--dark); border-color: var(--dark); color: var(--gold-light); transform: scale(0.95); }

.nav-buttons {
  display: flex;
  justify-content: flex-start;
  margin-top: 32px;
}
.btn-prev {
  padding: 11px 24px; cursor: pointer; font-size: 13px;
  background: transparent; border: 1px solid var(--border); color: var(--muted);
}
.btn-prev:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

/* ══════════════════════════
   RESULT SCREEN
══════════════════════════ */
#result { padding-bottom: 80px; }

.result-hero {
  background: var(--dark);
  padding: 70px 24px 60px;
  text-align: center;
}
.result-name { font-family: 'Noto Serif KR', serif; font-size: clamp(22px, 4vw, 36px); font-weight: 700; color: white; }

.result-body { max-width: 760px; margin: 0 auto; padding: 56px 24px 0; }
.section-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
.section-label::after { content: ''; flex:1; height:1px; background: var(--border); }

.strength-card {
  background: white; border: 1px solid var(--border); padding: 28px 32px;
  display: grid; grid-template-columns: 48px 1fr; gap: 20px; align-items: start;
  margin-bottom: 16px;
}
.rank-num { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: rgba(201,150,42,0.25); }
.s-name { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--dark); }

.domain-bars { margin-bottom: 56px; }
.d-bar-item { display: grid; grid-template-columns: 120px 1fr 36px; align-items: center; gap: 14px; margin-bottom: 16px; }
.d-bar-name { font-size: 13px; color: var(--brown); text-align: right; }
.d-bar-track { height: 8px; background: rgba(201,150,42,0.12); border-radius: 4px; overflow: hidden; }
.d-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

/* 📧 FormSubmit Style */
.feedback-box {
  background: #f8f1e6;
  border: 1px solid var(--border);
  padding: 32px;
  margin-top: 40px;
  border-radius: 4px;
}
.feedback-box h3 { font-family: 'Noto Serif KR', serif; color: var(--dark); margin-bottom: 12px; }
.feedback-textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid var(--border); margin-bottom: 16px; font-family: inherit; }
.btn-submit-feedback { background: var(--dark); color: var(--gold-light); border: none; padding: 12px 32px; cursor: pointer; transition: all 0.2s; }
.btn-submit-feedback:hover { background: var(--gold); color: var(--dark); }

.retry-area { text-align: center; padding-top: 40px; border-top: 1px solid var(--border); margin-top: 40px; }
.btn-retry { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); padding: 13px 40px; cursor: pointer; font-family: 'Noto Serif KR', serif; }

.disclaimer { font-size: 11px; color: rgba(92,61,30,0.45); margin-top: 24px; line-height: 1.6; }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="intro-ornament">✦</div>
  <div class="intro-tag">Internal Insight Program</div>
  <h1 class="intro-title">나의 <em>강점</em>을 발견하다</h1>
  <p class="intro-sub">CliftonStrengths 34가지 테마 기반 진단입니다.</p>
  <button class="btn-start" onclick="startQuiz()">진단 시작하기</button>
  <div id="prev-result-btn" style="display:none;margin-top:20px;">
    <button onclick="loadSavedResult()" style="background:transparent;border:1px solid rgba(201,150,42,0.4);color:var(--muted);padding:10px 28px;cursor:pointer;font-size:12px;">이전 결과 다시 보기</button>
    <div id="saved-date" style="font-size:11px;color:var(--muted);margin-top:8px;"></div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-logo">Strength Test</div>
    <div class="progress-wrap">
      <div class="progress-info"><span id="prog-label">준비 중</span><span id="prog-pct">0%</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="q-counter"><span id="q-current">1</span> <span style="opacity:0.4">/ 68</span></div>
  </div>
  <div class="quiz-body">
    <div class="q-domain-tag" id="q-domain">영역</div>
    <div class="question-text" id="q-text">문항</div>
    <div class="scale-buttons">
      <button class="scale-btn" onclick="selectScale(1)"><div class="dot"></div>1</button>
      <button class="scale-btn" onclick="selectScale(2)"><div class="dot"></div>2</button>
      <button class="scale-btn" onclick="selectScale(3)"><div class="dot"></div>3</button>
      <button class="scale-btn" onclick="selectScale(4)"><div class="dot"></div>4</button>
      <button class="scale-btn" onclick="selectScale(5)"><div class="dot"></div>5</button>
    </div>
    <div class="nav-buttons">
      <button class="btn-prev" id="btn-prev" onclick="goBack()">← 이전</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-hero">
    <div class="result-name">나의 상위 5가지 강점</div>
    <div style="color:rgba(255,255,255,0.5);font-size:13px;margin-top:8px;">당신만의 고유한 재능 DNA</div>
  </div>
  <div class="result-body">
    <div class="section-label">강점 TOP 5</div>
    <div class="top5-grid" id="top5-cards"></div>

    <div class="section-label">영역별 분포</div>
    <div class="domain-bars" id="domain-bars"></div>

    <!-- 📧 FormSubmit Integration -->
    <div class="section-label">의견 남기기</div>
    <div class="feedback-box">
      <h3>도구가 마음에 드셨나요?</h3>
      <!-- 여기에 본인의 이메일을 입력하세요 -->
      <form action="https://formsubmit.co/your-email@example.com" method="POST">
        <input type="hidden" name="_subject" value="강점 진단 새로운 피드백">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" id="hidden-top5" name="User_Top5" value="">
        <textarea name="Message" class="feedback-textarea" placeholder="개선할 점이나 소감을 남겨주세요." required></textarea>
        <button type="submit" class="btn-submit-feedback">피드백 전송하기</button>
      </form>
    </div>

    <div class="retry-area">
      <button class="btn-retry" onclick="restartQuiz()">다시 진단하기</button>
      <div class="disclaimer">
        ※ 본 진단은 CliftonStrengths 34가지 테마를 기반으로 제작된 약식 테스트입니다.<br>
        더 정확한 결과는 공식 홈페이지(store.gallup.com)를 참조하세요.
      </div>
    </div>
  </div>
</div>

const STORAGE_KEY = 'strengths_v2_result';
let currentQ = 0;
let answers = [];
let shuffledQuestions = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

window.addEventListener('DOMContentLoaded', () => {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (saved) {
    document.getElementById('prev-result-btn').style.display = 'block';
    const d = new Date(saved.date);
    document.getElementById('saved-date').textContent = `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} 진단`;
  }
});

function startQuiz() {
  currentQ = 0; answers = [];
  shuffledQuestions = shuffle(questions);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz').classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  const q = shuffledQuestions[currentQ];
  const total = shuffledQuestions.length;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-domain').textContent = themes[q.theme].domain;
  document.getElementById('q-current').textContent = currentQ + 1;
  const pct = Math.round((currentQ / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = `${currentQ+1} / ${total}`;

  document.querySelectorAll('.scale-btn').forEach((b, i) => b.classList.toggle('selected', answers[currentQ] === i + 1));
  document.getElementById('btn-prev').disabled = (currentQ === 0);
}

function selectScale(v) {
  answers[currentQ] = v;
  document.querySelectorAll('.scale-btn').forEach((b, i) => b.classList.toggle('selected', i + 1 === v));
  
  setTimeout(() => {
    if (currentQ < shuffledQuestions.length - 1) {
      currentQ++;
      renderQuestion();
    } else {
      finalize();
    }
  }, 150);
}

function goBack() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function finalize() {
  const finalScores = {};
  Object.keys(themes).forEach(t => finalScores[t] = 0);
  shuffledQuestions.forEach((q, i) => { if (answers[i]) finalScores[q.theme] += answers[i]; });
  
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ scores: finalScores, date: new Date().toISOString() }));
  showResult(finalScores);
}

function showResult(scores) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('result').classList.add('active');
  window.scrollTo(0, 0);

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const top5 = sorted.slice(0, 5);

  document.getElementById('hidden-top5').value = top5.map(s => s[0]).join(', ');

  const container = document.getElementById('top5-cards');
  container.innerHTML = '';
  top5.forEach(([name, score], i) => {
    const t = themes[name];
    container.innerHTML += `<div class="strength-card ${i===0?'rank-1':''}">
      <div class="rank-num">${i+1}</div>
      <div>
        <div class="s-name">${name}</div>
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;">${t.en} · ${t.domain}</div>
        <div style="font-size:14px;margin-top:8px;line-height:1.6;">${t.desc}</div>
        <div style="font-size:13px;margin-top:12px;color:var(--brown);font-weight:500;">💡 활용: ${t.action}</div>
      </div>
    </div>`;
  });

  const domainScores = { '실행력':0, '영향력':0, '관계형성':0, '전략적사고':0 };
  Object.entries(themes).forEach(([k, v]) => { domainScores[v.domain] += scores[k]; });

  const barsEl = document.getElementById('domain-bars');
  barsEl.innerHTML = '';
  const colors = { '실행력':'#C9962A', '영향력':'#8B4513', '관계형성':'#2E6B3E', '전략적사고':'#1B3A6B' };
  Object.entries(domainScores).sort((a,b)=>b[1]-a[1]).forEach(([domain, s]) => {
    const pct = Math.min(100, Math.round((s / (Object.values(themes).filter(t=>t.domain===domain).length * 5)) * 100));
    barsEl.innerHTML += `<div class="d-bar-item">
      <div class="d-bar-name">${domain}</div>
      <div class="d-bar-track"><div class="d-bar-fill" style="width:${pct}%;background:${colors[domain]}"></div></div>
      <div class="d-bar-score">${pct}%</div>
    </div>`;
  });
}

function loadSavedResult() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (saved) showResult(saved.scores);
}

function restartQuiz() { startQuiz(); }
